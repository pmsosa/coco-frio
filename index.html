<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coco Frio — a videogame collection</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #050c07;
      --bg2:    #07110a;
      --border: #0d2210;
      --text:   #c8ddc0;
      --dim:    #3a6040;
      --cyan:   #00d4aa;
      --orange: #ffaa44;
      --mono:   'JetBrains Mono', monospace;
    }
    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.65; }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 2rem; border-bottom: 1px solid var(--border);
    }
    .nav-back {
      font-family: var(--mono); font-size: 0.72rem; color: var(--dim);
      text-decoration: none; letter-spacing: 0.04em; transition: color 0.2s;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .nav-back:hover { color: var(--cyan); }
    .nav-label {
      font-family: var(--mono); font-size: 0.68rem; color: var(--dim);
      letter-spacing: 0.1em;
    }

    /* ── LAYOUT ── */
    main { max-width: 900px; margin: 0 auto; padding: 3rem 2rem 6rem; }
    .page-eyebrow { font-family: var(--mono); font-size: 0.65rem; color: var(--orange); letter-spacing: 0.1em; margin-bottom: 0.6rem; }
    .page-title { font-size: clamp(1.6rem, 4vw, 2.6rem); font-weight: 300; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .page-title em { color: var(--orange); font-style: normal; }
    .page-sub { font-family: var(--mono); font-size: 0.72rem; color: var(--dim); margin-bottom: 3rem; letter-spacing: 0.04em; }

    /* ── SLIDER ── */
    .slider-wrap { position: relative; }
    .slider-viewport { overflow: hidden; border-radius: 4px; border: 1px solid var(--border); }
    .slider-track { display: flex; transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }
    .slide { flex: 0 0 100%; min-width: 0; }

    .slide-banner {
      width: 100%; aspect-ratio: 4 / 1;
      object-fit: cover; object-position: center;
      display: block;
      border-bottom: 1px solid var(--border);
    }
    .slide-banner-placeholder {
      width: 100%; aspect-ratio: 4 / 1;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 0.65rem; color: var(--dim);
      letter-spacing: 0.1em;
    }
    .slide-body { padding: 1.6rem 2rem 2rem; background: var(--bg2); }
    .slide-badge {
      font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.1em;
      color: var(--orange); display: block; margin-bottom: 0.5rem;
    }
    .slide-name { font-size: 1.4rem; font-weight: 400; margin-bottom: 0.4rem; letter-spacing: -0.01em; }
    .slide-desc { font-size: 0.83rem; color: var(--text); line-height: 1.6; max-width: 56ch; margin-bottom: 1.4rem; }
    .slide-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.6rem; }
    .slide-tag {
      font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.06em;
      color: var(--dim); border: 1px solid rgba(58,96,64,0.4);
      padding: 0.18rem 0.55rem; border-radius: 2px;
    }
    .slide-actions { display: flex; align-items: center; gap: 1rem; }
    .btn-play {
      font-family: var(--mono); font-size: 0.74rem; letter-spacing: 0.06em;
      color: var(--bg); background: var(--orange);
      border: none; border-radius: 2px;
      padding: 0.55rem 1.3rem; cursor: pointer;
      text-decoration: none; display: inline-block;
      transition: opacity 0.15s;
    }
    .btn-play:hover { opacity: 0.85; }

    /* ── SLIDER CONTROLS ── */
    .slider-controls {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 1.2rem;
    }
    .slider-dots { display: flex; gap: 0.5rem; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      border: 1px solid var(--dim); background: transparent;
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
      padding: 0;
    }
    .dot.active { background: var(--orange); border-color: var(--orange); }
    .slider-arrows { display: flex; gap: 0.5rem; }
    .arrow {
      font-family: var(--mono); font-size: 0.72rem; color: var(--dim);
      background: transparent; border: 1px solid var(--border);
      border-radius: 2px; padding: 0.3rem 0.7rem; cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      line-height: 1;
    }
    .arrow:hover:not(:disabled) { color: var(--orange); border-color: rgba(255,170,68,0.4); }
    .arrow:disabled { opacity: 0.25; cursor: default; }

    .slider-controls.single { display: none; }

    /* ── FILTER ── */
    .game-filter { font-family:var(--mono); font-size:0.72rem; color:var(--text); background:var(--bg); border:1px solid var(--border); border-radius:2px; padding:0.5rem 0.9rem; width:100%; margin-bottom:1.5rem; letter-spacing:0.04em; outline:none; transition:border-color 0.2s; }
    .game-filter:focus { border-color:rgba(255,170,68,0.4); }
    .game-filter::placeholder { color:var(--dim); }
    .no-results { font-family:var(--mono); font-size:0.72rem; color:var(--dim); text-align:center; padding:2rem 0; }

    @media (max-width: 600px) {
      main { padding: 2rem 1.2rem 4rem; }
      nav { padding: 1rem 1.2rem; }
      .slide-body { padding: 1.2rem 1.2rem 1.6rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-back" href="/">← konukoii.com</a>
  <span class="nav-label">// COCO FRIO</span>
</nav>

<main>
  <div class="page-eyebrow">◉ &nbsp;COCO FRIO</div>
  <h1 class="page-title">a videogame <em>collection.</em></h1>
  <p class="page-sub">back to roots — making games like i did in high school<br>last updated: may 15, 2026&nbsp;·&nbsp; more coming soon</p>

  <input class="game-filter" id="game-filter" type="search" placeholder="filter games..." autocomplete="off" spellcheck="false">
  <p class="no-results" id="no-results" hidden>no games found</p>

  <div class="slider-wrap">
    <div class="slider-viewport">
      <div class="slider-track" id="track"></div>
    </div>
    <div class="slider-controls" id="controls">
      <div class="slider-dots" id="dots"></div>
      <div class="slider-arrows">
        <button class="arrow" id="prev" aria-label="Previous">←</button>
        <button class="arrow" id="next" aria-label="Next">→</button>
      </div>
    </div>
  </div>
</main>

<script>
  const track     = document.getElementById('track');
  const dotsEl    = document.getElementById('dots');
  const prevBtn   = document.getElementById('prev');
  const nextBtn   = document.getElementById('next');
  const ctrl      = document.getElementById('controls');
  const filterEl  = document.getElementById('game-filter');
  const noResults = document.getElementById('no-results');

  let allSlides = [];
  let visible   = [];
  let current   = 0;

  function buildBanner(game) {
    const img = document.createElement('img');
    img.className = 'slide-banner';
    img.alt = `${game.name} banner`;
    img.src = `${game.id}/${game.id}.png`;
    img.onerror = () => {
      const ph = document.createElement('div');
      ph.className = 'slide-banner-placeholder';
      ph.textContent = 'NO BANNER';
      img.replaceWith(ph);
    };
    return img;
  }

  function buildSlide(game) {
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.dataset.name = game.name.toLowerCase();

    const body = document.createElement('div');
    body.className = 'slide-body';
    body.innerHTML = `
      <span class="slide-badge">${game.badge}</span>
      <div class="slide-name">${game.name}</div>
      <p class="slide-desc">${game.desc}</p>
      <div class="slide-tags">${game.tags.map(t => `<span class="slide-tag">${t}</span>`).join('')}</div>
      <div class="slide-actions">
        <a class="btn-play" href="${game.id}/">PLAY →</a>
      </div>
    `;

    slide.appendChild(buildBanner(game));
    slide.appendChild(body);
    return slide;
  }

  function rebuildDots() {
    dotsEl.innerHTML = '';
    visible.forEach((_, i) => {
      const d = document.createElement('button');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.setAttribute('aria-label', `Game ${i + 1}`);
      d.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(d);
    });
    ctrl.classList.toggle('single', visible.length <= 1);
  }

  function goTo(n) {
    if (!visible.length) return;
    current = Math.max(0, Math.min(n, visible.length - 1));
    track.style.transform = `translateX(-${current * 100}%)`;
    dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === visible.length - 1;
  }

  filterEl.addEventListener('input', () => {
    const q = filterEl.value.trim().toLowerCase();
    allSlides.forEach(s => {
      s.style.display = (!q || s.dataset.name.includes(q)) ? '' : 'none';
    });
    visible = allSlides.filter(s => s.style.display !== 'none');
    noResults.hidden = visible.length > 0;
    current = 0;
    rebuildDots();
    goTo(0);
  });

  prevBtn.addEventListener('click', () => goTo(current - 1));
  nextBtn.addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', e => {
    if (document.activeElement === filterEl) return;
    if (e.key === 'ArrowLeft')  goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });

  fetch('games.json')
    .then(r => r.json())
    .then(games => {
      allSlides = games.map(g => {
        const slide = buildSlide(g);
        track.appendChild(slide);
        return slide;
      });
      visible = allSlides.slice();
      rebuildDots();
      goTo(0);
    });
</script>
</body>
</html>
